title: Birds of 2023
shootDate: 2024-02-14
photos:
  - image: /images/galleries/birds-of-2023/photos/0/image.jpg
    caption: >-
      February saw return of use of my elbow enough to use my big lens and get
      some shots of the Sandhills that congregate along the Rio Grande.
  - image: /images/galleries/birds-of-2023/photos/1/image.jpg
    caption: >-
      New bird the Brown Thrasher. Likes to skulk in the brambles but at least I
      got a shot.
  - image: /images/galleries/birds-of-2023/photos/2/image.jpg
    caption: >-
      Cedar Waxwings are not new but I enjoyed watching a flock for several days
      around our house. Beautiful!
  - image: /images/galleries/birds-of-2023/photos/3/image.jpg
    caption: >-
      This Lucy's Warbler was a new bird for me. Somewhat drab compared to many
      warblers but exciting to see!
  - image: /images/galleries/birds-of-2023/photos/4/image.jpg
    caption: >-
      Another bird I'd caught glimpses of before but never decent pictures of is
      the Black-Throated Gray Warbler. So cool looking with his little yellow
      eye marks!
  - image: /images/galleries/birds-of-2023/photos/5/image.jpg
    caption: >-
      I was really excited to get a shot of the Gray Catbird. They are usually
      pretty elusive.
  - image: /images/galleries/birds-of-2023/photos/6/image.jpg
    caption: >-
      Lots of Red Crossbills have been around at Capulin Springs. This shot,
      though dark, shows how many came down to drink.
  - image: /images/galleries/birds-of-2023/photos/7/image.jpg
    caption: >-
      I was excited to get a shot of this Nashville Warbler among the
      sunflowers. There were a couple along with Orange-Crowned and Wilson's.
      Very like a cross between a Virginia's and Orange-Crowned.
  - image: /images/galleries/birds-of-2023/photos/8/image.jpg
    caption: >-
      I think the bird of the year has to be this Lewis's Woodpecker. I'd been
      trying to see one to no avail and finally before leaving NM and thanks to
      other birders, I was able to find one.
