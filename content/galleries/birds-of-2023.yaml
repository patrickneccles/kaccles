title: Birds of 2023
shootDate: 2024-02-14
photos:
  - image: galleries/birds-of-2023/vyiyuq5vn1lns8h28c4e.jpg
    caption: February saw return of use of my elbow enough to use my big lens and
      get some shots of the Sandhills that congregate along the Rio Grande.
  - image: galleries/birds-of-2023/tvve7si3jjpdzodghsss.jpg
    caption: New bird the Brown Thrasher. Likes to skulk in the brambles but at
      least I got a shot.
  - image: galleries/birds-of-2023/pe5bnm02mkbjyldxc0gw.jpg
    caption: Cedar Waxwings are not new but I enjoyed watching a flock for several
      days around our house. Beautiful!
  - image: galleries/birds-of-2023/rsmd8vptggneeu8nsshz.jpg
    caption: This Lucy's Warbler was a new bird for me. Somewhat drab compared to
      many warblers but exciting to see!
  - image: galleries/birds-of-2023/u52uzsosdakl4wp7swkl.jpg
    caption: Another bird I'd caught glimpses of before but never decent pictures of
      is the Black-Throated Gray Warbler. So cool looking with his little yellow
      eye marks!
  - image: galleries/birds-of-2023/mjom4i3roiazlesydxal.jpg
    caption: I was really excited to get a shot of the Gray Catbird. They are
      usually pretty elusive.
  - image: galleries/birds-of-2023/zo1c9wfxgeqbfwiidnkv.jpg
    caption: Lots of Red Crossbills have been around at Capulin Springs. This shot,
      though dark, shows how many came down to drink.
  - image: galleries/birds-of-2023/xng0d342cbgrryengwrh.jpg
    caption: I was excited to get a shot of this Nashville Warbler among the
      sunflowers. There were a couple along with Orange-Crowned and Wilson's.
      Very like a cross between a Virginia's and Orange-Crowned.
  - image: galleries/birds-of-2023/u6wwkx6er4agaj9rmqg0.jpg
    caption: I think the bird of the year has to be this Lewis's Woodpecker. I'd
      been trying to see one to no avail and finally before leaving NM and
      thanks to other birders, I was able to find one.
