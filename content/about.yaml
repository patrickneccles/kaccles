bio: >
  Kathryn Eccles is a photographer based in Cache Valley, Utah, with an eye to
  capture the wonders of Creation. After a stint in Albuquerque — exploring the
  Rio Grande bosque and Sandia Mountains — she continues to travel the American
  West through birds, wildlife, and all shapes of nature.


  All images on this site are watermarked for display. Original, full-resolution
  files are available by request.
